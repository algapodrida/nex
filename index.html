<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Game World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#02040a;--c1:#00f5ff;--c2:#ff006e;--c3:#adff2f;--gold:#ffd700;--bd:rgba(0,245,255,0.22);}
html,body{background:var(--bg);color:#e0f7fa;font-family:'Space Mono',monospace;overflow:hidden;height:100vh;}

.screen{position:fixed;inset:0;display:none;top:50px;}
#scr-lobby{display:block;top:0;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;height:50px;display:none;
  background:rgba(2,4,10,0.93);border-bottom:1px solid var(--bd);
  align-items:center;justify-content:space-between;padding:0 20px;z-index:200;backdrop-filter:blur(12px);}
#hud.on{display:flex;}
.hl{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;letter-spacing:4px;
  color:var(--c1);text-shadow:0 0 18px rgba(0,245,255,0.5);}
.hn{font-size:11px;letter-spacing:2px;color:var(--c3);background:rgba(173,255,47,0.07);
  border:1px solid rgba(173,255,47,0.2);padding:4px 12px;}
.hc{font-size:10px;color:#4a6572;}

/* Players panel */
#pp{position:fixed;top:60px;right:12px;width:170px;background:rgba(2,4,10,0.9);
  border:1px solid var(--bd);padding:10px;z-index:150;display:none;}
#pp.on{display:block;}
.ppt{font-size:8px;letter-spacing:2px;color:#4a6572;text-transform:uppercase;
  margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.ppi{display:flex;align-items:center;gap:7px;font-size:10px;padding:3px 0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ppc{width:9px;height:9px;flex-shrink:0;}

/* Entry */
#entry{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 60%,#0a1628 0%,#02040a 70%);}
.eg{position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);
  background-size:50px 50px;animation:gp 25s linear infinite;}
@keyframes gp{from{background-position:0 0}to{background-position:50px 50px}}
.ec{position:relative;background:rgba(0,245,255,0.04);border:1px solid var(--bd);
  padding:48px 58px;width:490px;backdrop-filter:blur(20px);
  box-shadow:0 0 80px rgba(0,245,255,0.07),inset 0 1px 0 rgba(255,255,255,0.04);}
.ec::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:2px;
  background:linear-gradient(90deg,transparent,var(--c1),transparent);}
.et{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;letter-spacing:6px;
  color:var(--c1);text-shadow:0 0 36px rgba(0,245,255,0.55);margin-bottom:4px;}
.es{font-size:9px;letter-spacing:4px;color:#4a6572;text-transform:uppercase;margin-bottom:32px;}
.el{display:block;font-size:9px;letter-spacing:2px;color:#4a6572;text-transform:uppercase;margin-bottom:7px;}
.ei{width:100%;background:rgba(0,245,255,0.03);border:1px solid var(--bd);color:var(--c1);
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;padding:12px 15px;
  outline:none;letter-spacing:3px;transition:border-color 0.2s;margin-bottom:18px;}
.ei:focus{border-color:var(--c1);}
.ei::placeholder{color:rgba(0,245,255,0.17);}
.eb{width:100%;background:transparent;border:1px solid var(--c1);color:var(--c1);
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;
  padding:14px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;
  position:relative;overflow:hidden;}
.eb::before{content:'';position:absolute;inset:0;background:var(--c1);
  transform:scaleX(0);transform-origin:left;transition:transform 0.25s;z-index:0;}
.eb:hover::before{transform:scaleX(1);}
.eb:hover{color:var(--bg);}
.eb span{position:relative;z-index:1;}
#estat{font-size:9px;letter-spacing:1px;color:#4a6572;margin-bottom:14px;min-height:14px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--c3);box-shadow:0 0 7px var(--c3);
  animation:pu 2s infinite;display:inline-block;vertical-align:middle;margin-right:7px;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:0.35}}

/* Game HUDs */
.ghud{position:fixed;top:50px;left:0;right:0;padding:10px 20px;
  display:flex;justify-content:space-between;align-items:center;z-index:150;pointer-events:none;}
.gscore{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;}
.glb{font-size:10px;letter-spacing:2px;color:#4a6572;}
.gl{font-size:18px;color:var(--c2);}
.back{position:fixed;bottom:20px;left:20px;z-index:300;background:transparent;
  border:1px solid rgba(0,245,255,0.35);color:var(--c1);font-family:'Orbitron',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:2px;padding:8px 18px;cursor:pointer;}
.back:hover{background:rgba(0,245,255,0.08);}
.gtip{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:2px;color:#4a6572;pointer-events:none;z-index:300;}

/* Lobby tip */
#ltip{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:3px;color:rgba(0,245,255,0.4);text-transform:uppercase;
  animation:bl 2s ease infinite;pointer-events:none;z-index:150;}
@keyframes bl{0%,100%{opacity:0.25}50%{opacity:1}}

/* Game over */
.go{position:fixed;inset:0;z-index:600;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;background:rgba(2,4,10,0.93);backdrop-filter:blur(8px);}
.go.on{display:flex;}
.got{font-family:'Orbitron',sans-serif;font-size:46px;font-weight:900;letter-spacing:8px;
  text-shadow:0 0 38px currentColor;}
.gos{font-family:'Orbitron',sans-serif;font-size:15px;letter-spacing:4px;color:#4a6572;}
.gb{background:transparent;border:1px solid;font-family:'Orbitron',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:3px;padding:12px 28px;cursor:pointer;
  text-transform:uppercase;transition:filter 0.2s;margin:3px;}
.gb:hover{filter:brightness(1.4);}

/* Toast */
#toast{position:fixed;bottom:55px;left:50%;transform:translateX(-50%);
  background:rgba(2,4,10,0.97);border:1px solid var(--bd);padding:7px 20px;
  font-size:11px;letter-spacing:1px;color:var(--c1);z-index:400;
  opacity:0;transition:opacity 0.3s;white-space:nowrap;pointer-events:none;}
#toast.on{opacity:1;}
</style>
</head>
<body>

<!-- ENTRY -->
<div id="entry">
  <div class="eg"></div>
  <div class="ec">
    <div class="et">NEXUS</div>
    <div class="es">Game World · Multijugador</div>
    <div style="margin-bottom:18px;font-size:9px;color:#4a6572;">
      <span class="dot"></span>Conexión P2P en tiempo real
    </div>
    <div id="estat"></div>
    <label class="el">Nickname</label>
    <input class="ei" id="ni" placeholder="PLAYER_01" maxlength="16" autocomplete="off"/>
    <label class="el">Sala (misma sala = mismo mundo)</label>
    <input class="ei" id="ri" placeholder="SALA_01" maxlength="20" autocomplete="off"/>
    <button class="eb" onclick="doEnter()"><span>▶ ENTRAR AL NEXUS</span></button>
  </div>
</div>

<!-- HUD -->
<div id="hud"><div class="hl">NEXUS</div><div class="hn" id="hn"></div><div class="hc" id="hc">1 jugador</div></div>
<div id="pp"><div class="ppt">En la sala</div><div id="ppi"></div></div>

<!-- LOBBY -->
<div class="screen" id="scr-lobby">
  <canvas id="cL"></canvas>
  <div id="ltip">Click → capturar ratón &nbsp;·&nbsp; WASD mover &nbsp;·&nbsp; E entrar portal</div>
</div>

<!-- GEO -->
<div class="screen" id="scr-geo">
  <canvas id="cG"></canvas>
  <div class="ghud">
    <div class="gscore" id="gsc" style="color:var(--c3);text-shadow:0 0 18px rgba(173,255,47,.5)">0</div>
    <div class="glb" id="gpc">0%</div>
  </div>
  <button class="back" onclick="goLobby()">← LOBBY</button>
  <div class="gtip">ESPACIO / CLICK — Saltar</div>
</div>
<div class="go" id="goGeo">
  <div class="got" style="color:var(--c3)">GAME OVER</div>
  <div class="gos" id="goGeoT"></div>
  <button class="gb" style="color:var(--c3);border-color:var(--c3)" onclick="geoStart()">REINTENTAR</button>
  <button class="gb" style="color:#4a6572;border-color:#4a6572" onclick="goLobby()">LOBBY</button>
</div>

<!-- SHOOTER -->
<div class="screen" id="scr-shooter">
  <canvas id="cS"></canvas>
  <div class="ghud">
    <div class="gscore" id="ssc" style="color:var(--c2);text-shadow:0 0 18px rgba(255,0,110,.5)">0</div>
    <div class="glb" id="swv">OLA 1</div>
    <div class="gl" id="slv">❤ ❤ ❤</div>
  </div>
  <button class="back" onclick="goLobby()">← LOBBY</button>
  <div class="gtip">WASD mover · ESPACIO/CLICK disparar</div>
</div>
<div class="go" id="goSh">
  <div class="got" style="color:var(--c2)">GAME OVER</div>
  <div class="gos" id="goShT"></div>
  <button class="gb" style="color:var(--c2);border-color:var(--c2)" onclick="shStart()">REINTENTAR</button>
  <button class="gb" style="color:#4a6572;border-color:#4a6572" onclick="goLobby()">LOBBY</button>
</div>

<!-- PVP -->
<div class="screen" id="scr-pvp">
  <canvas id="cP"></canvas>
  <div class="ghud">
    <div class="gscore" id="pkv" style="color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,.5)">Kills: 0</div>
    <div class="glb" id="ppc2">Solo</div>
  </div>
  <button class="back" onclick="goLobby()">← LOBBY</button>
  <div class="gtip">WASD mover · ESPACIO/CLICK disparar</div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ╔══════════════════════════════════════════════════════════╗
//  NEXUS — Rewrite v3
//  Multiplayer via PieSocket (free public WS relay)
//  All renderers use explicit pixel sizes, no CSS override
// ╚══════════════════════════════════════════════════════════╝
'use strict';

const COLORS=['#00f5ff','#ff006e','#adff2f','#ff9500','#bf5fff',
              '#ff4757','#2ed573','#ffa502','#70a1ff','#ff6b81'];

// ── globals ──
let ME={nick:'',room:'',id:'',color:''};
let PEERS={};          // id → {nick,color,x,z,screen,lastSeen}
let curScreen='entry';
const K={};            // keys pressed

// ── keys (skip inputs) ──
window.addEventListener('keydown',e=>{
  if(document.activeElement&&document.activeElement.tagName==='INPUT') return;
  K[e.code]=K[e.key.toLowerCase()]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
},{passive:false});
window.addEventListener('keyup',e=>{ K[e.code]=K[e.key.toLowerCase()]=false; });

// ════════════════════════════════════════════════════════════
//  MULTIPLAYER — PieSocket free public relay
//  Channel = sha-ish of room name → unique per sala
// ════════════════════════════════════════════════════════════
let ws=null;
let wsPingInterval=null;

function roomChan(room){
  // simple hash → channel id (PieSocket accepts alphanumeric)
  let h=5381;
  for(let i=0;i<room.length;i++) h=((h<<5)+h)+room.charCodeAt(i);
  return 'nexus'+Math.abs(h).toString(36).slice(0,10);
}

function netInit(){
  const chan=roomChan(ME.room);
  // Free PieSocket demo — no account needed, public channels
  const url=`wss://s14470.blr1.piesocket.com/v3/${chan}?api_key=VCXCEuvhGcBDP7XhiJJUDvR1e1D3eiVjgZ9f&notify_self=0`;
  setStatus('Conectando…');
  ws=new WebSocket(url);
  ws.onopen=()=>{
    setStatus('✓ Conectado — sala: '+ME.room);
    netSend({t:'hello',nick:ME.nick,color:ME.color});
    // ping loop so others know we're alive
    wsPingInterval=setInterval(()=>netSend({t:'ping',x:lobbyPx,z:lobbyPz,screen:curScreen}),2000);
  };
  ws.onmessage=e=>{ try{ netRecv(JSON.parse(e.data)); }catch{} };
  ws.onerror=()=>setStatus('⚠ Error WS');
  ws.onclose=()=>{ setStatus('Reconectando…'); clearInterval(wsPingInterval); setTimeout(netInit,3000); };
  window.addEventListener('beforeunload',()=>{ ws&&ws.readyState===1&&netSend({t:'bye'}); });
}

function netSend(msg){
  if(!ws||ws.readyState!==1) return;
  msg.id=ME.id; msg.room=ME.room;
  ws.send(JSON.stringify(msg));
}

function netRecv(msg){
  if(!msg||msg.id===ME.id||msg.room!==ME.room) return;
  if(msg.t==='bye'){ peerLeave(msg.id); return; }
  if(msg.t==='hello'||msg.t==='ping'||msg.t==='state'){
    const isNew=!PEERS[msg.id];
    PEERS[msg.id]={
      nick:msg.nick||PEERS[msg.id]?.nick||msg.id,
      color:msg.color||PEERS[msg.id]?.color||'#4a6572',
      x:msg.x||0, z:msg.z||0,
      screen:msg.screen||'lobby',
      lastSeen:Date.now()
    };
    if(isNew){ toast((PEERS[msg.id].nick)+' se unió!'); netSend({t:'state',nick:ME.nick,color:ME.color,x:lobbyPx,z:lobbyPz,screen:curScreen}); }
    updatePP();
  }
  if(msg.t==='pvp_b') pvpRemoteBullet(msg);
}

function peerLeave(id){
  if(!PEERS[id]) return;
  toast(PEERS[id].nick+' salió');
  delete PEERS[id];
  // Remove 3D meshes
  lbRemoveRemote(id);
  pvpRemoveRemote(id);
  updatePP();
}

// Prune dead peers
setInterval(()=>{
  const now=Date.now();
  for(const id in PEERS) if(now-PEERS[id].lastSeen>8000) peerLeave(id);
},3000);

// ── UI helpers ──
function setStatus(s){ const el=document.getElementById('estat'); if(el) el.textContent=s; }

let toastTm;
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m; el.classList.add('on');
  clearTimeout(toastTm); toastTm=setTimeout(()=>el.classList.remove('on'),2800);
}

function updatePP(){
  const el=document.getElementById('ppi'); el.innerHTML='';
  // self
  const self=document.createElement('div');
  self.className='ppi'; self.style.color='var(--c3)';
  self.innerHTML=`<div class="ppc" style="background:${ME.color};box-shadow:0 0 5px ${ME.color}"></div>⚡ ${ME.nick}`;
  el.appendChild(self);
  for(const id in PEERS){
    const p=PEERS[id];
    const d=document.createElement('div'); d.className='ppi';
    d.innerHTML=`<div class="ppc" style="background:${p.color};box-shadow:0 0 5px ${p.color}"></div>${p.nick}`;
    el.appendChild(d);
  }
  const c=Object.keys(PEERS).length+1;
  document.getElementById('hc').textContent=c===1?'1 jugador':c+' jugadores';
}

// ── Screen management ──
function showScreen(s){
  document.querySelectorAll('.screen').forEach(el=>el.style.display='none');
  const sc=document.getElementById('scr-'+s);
  sc.style.display='block';
  curScreen=s;
  // Init + resize AFTER making visible so clientWidth/Height are correct
  if(s==='lobby') { lbInit(); lbResize(); }
  if(s==='geo')   { geoInit(); geoResize(); geoStart(); }
  if(s==='shooter'){ shInit(); shResize(); shStart(); }
  if(s==='pvp')   { pvpInit(); pvpResize(); pvpStart(); }
}

function goLobby(){
  geoStop(); shStop(); pvpStop();
  document.getElementById('goGeo').classList.remove('on');
  document.getElementById('goSh').classList.remove('on');
  showScreen('lobby');
}

window.addEventListener('resize',()=>{ lbResize(); geoResize(); shResize(); pvpResize(); });

// ════════════════════════════════════════════════════════════
//  ENTRY
// ════════════════════════════════════════════════════════════
function doEnter(){
  const nick=(document.getElementById('ni').value.trim().toUpperCase()||'PLAYER_'+~~(Math.random()*99)).slice(0,16);
  const room=(document.getElementById('ri').value.trim().toUpperCase()||'SALA_01').slice(0,20);
  ME.nick=nick; ME.room=room;
  ME.id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  ME.color=COLORS[~~(Math.random()*COLORS.length)];
  document.getElementById('entry').style.display='none';
  document.getElementById('hud').classList.add('on');
  document.getElementById('pp').classList.add('on');
  document.getElementById('hn').textContent=ME.nick;
  updatePP();
  netInit();
  showScreen('lobby');
}
window.doEnter=doEnter;
document.getElementById('ni').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('ri').focus(); });
document.getElementById('ri').addEventListener('keydown',e=>{ if(e.key==='Enter') doEnter(); });

// ════════════════════════════════════════════════════════════
//  LOBBY 3D
// ════════════════════════════════════════════════════════════
let lbR=null,lbScene=null,lbCam=null,lbAf=null;
let lbMesh=null,lobbyPx=0,lobbyPz=0;
let lbRemotes={}; // id→mesh
let lbPortals=[]; // {x,z,game,inner,label,light}
let lbGlows=[];
let camYaw=0,camPitch=0.3;
let pointerLocked=false;
const LSPD=0.1,CSENS=0.002;

function lbInit(){
  const cv=document.getElementById('cL');
  if(lbR){ lbRun(); return; }

  lbR=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  lbR.setPixelRatio(Math.min(devicePixelRatio,2));
  lbR.setClearColor(0x02040a);
  lbScene=new THREE.Scene();
  lbScene.fog=new THREE.Fog(0x02040a,28,72);
  lbCam=new THREE.PerspectiveCamera(65,1,0.1,150);

  lbScene.add(new THREE.AmbientLight(0x112233,2));
  const dl=new THREE.DirectionalLight(0x00f5ff,0.6); dl.position.set(5,10,5); lbScene.add(dl);

  // Floor
  const fg=new THREE.Mesh(new THREE.PlaneGeometry(80,80,40,40),
    new THREE.MeshBasicMaterial({color:0x00f5ff,wireframe:true,transparent:true,opacity:0.05}));
  fg.rotation.x=-Math.PI/2; lbScene.add(fg);
  const sf=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshStandardMaterial({color:0x020507}));
  sf.rotation.x=-Math.PI/2; sf.position.y=-0.02; lbScene.add(sf);

  // Stars
  const sg=new THREE.BufferGeometry(),sp=[];
  for(let i=0;i<500;i++) sp.push((Math.random()-.5)*120,Math.random()*30+4,(Math.random()-.5)*120);
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  lbScene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x4a6572,size:0.15})));

  // Player cube
  const col=new THREE.Color(ME.color);
  lbMesh=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.9,0.9),
    new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.5}));
  lbMesh.position.set(0,0.45,0);
  lbMesh.add(new THREE.PointLight(col,2,5));
  lbScene.add(lbMesh);

  // Portals
  lbMakePortal( 0,  0,-24, 0xadff2f,'GEOMETRY DASH','geo','z');
  lbMakePortal(-20, 0,  0, 0x00f5ff,'MATAMARCIANOS','shooter','x');
  lbMakePortal( 20, 0,  0, 0xff006e,'PVP ARENA',    'pvp','x');

  // Pillars
  [[-10,0,-10],[10,0,-10],[-10,0,10],[10,0,10]].forEach(([x,,z])=>{
    const p=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,7,8),
      new THREE.MeshStandardMaterial({color:0x0d1a2e}));
    p.position.set(x,3.5,z); lbScene.add(p);
    const r=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.06,8,16),
      new THREE.MeshBasicMaterial({color:0x00f5ff,transparent:true,opacity:0.35}));
    r.position.set(x,6.5,z); r.rotation.x=Math.PI/2; lbScene.add(r);
  });

  // Pointer lock
  cv.addEventListener('click',()=>{ if(curScreen==='lobby') cv.requestPointerLock(); });
  document.addEventListener('pointerlockchange',()=>{ pointerLocked=document.pointerLockElement===cv; });
  document.addEventListener('mousemove',e=>{
    if(!pointerLocked||curScreen!=='lobby') return;
    camYaw  -=e.movementX*CSENS;
    camPitch =Math.max(-0.5,Math.min(0.5,camPitch-e.movementY*CSENS));
  });

  lbRun();
}

function lbMakePortal(x,y,z,hex,label,game,axis){
  const col=new THREE.Color(hex);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(2.8,0.2,12,48),
    new THREE.MeshBasicMaterial({color:col}));
  ring.position.set(x,3.2,z);
  if(axis==='x') ring.rotation.y=Math.PI/2;
  lbScene.add(ring);

  const inner=new THREE.Mesh(new THREE.CircleGeometry(2.6,48),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.12,side:THREE.DoubleSide}));
  inner.position.set(x,3.2,z);
  if(axis==='x') inner.rotation.y=Math.PI/2;
  lbScene.add(inner);

  const light=new THREE.PointLight(col,2.5,10);
  light.position.set(x,3.2,z); lbScene.add(light);
  lbGlows.push({light,base:2.5,t:Math.random()*10});

  // DOM label
  const div=document.createElement('div');
  div.style.cssText=`position:fixed;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
    letter-spacing:3px;color:#${hex.toString(16).padStart(6,'0')};background:rgba(2,4,10,0.75);
    border:1px solid rgba(${(hex>>16)&255},${(hex>>8)&255},${hex&255},0.4);
    padding:5px 14px;pointer-events:none;z-index:120;text-shadow:0 0 8px currentColor;
    transform:translate(-50%,-50%);display:none;`;
  div.textContent=label;
  document.body.appendChild(div);

  lbPortals.push({x,z,game,inner,light,div});
}

function lbResize(){
  if(!lbR) return;
  const W=window.innerWidth, H=window.innerHeight;
  lbR.setSize(W,H,false);
  lbCam.aspect=W/H; lbCam.updateProjectionMatrix();
}

let lbLastProx=null;
function lbRun(){
  if(lbAf) cancelAnimationFrame(lbAf);
  lbLoop();
}
function lbLoop(){
  lbAf=requestAnimationFrame(lbLoop);
  if(curScreen!=='lobby') return;
  const t=performance.now()*0.001;

  // Movement
  let mx=0,mz=0;
  if(K['KeyW']||K['w']||K['arrowup'])    mz=-1;
  if(K['KeyS']||K['s']||K['arrowdown'])  mz= 1;
  if(K['KeyA']||K['a']||K['arrowleft'])  mx=-1;
  if(K['KeyD']||K['d']||K['arrowright']) mx= 1;
  if(mx&&mz){mx*=0.707;mz*=0.707;}
  const fX=Math.sin(camYaw), fZ=-Math.cos(camYaw);
  const sX=Math.cos(camYaw), sZ=Math.sin(camYaw);
  lobbyPx=Math.max(-28,Math.min(28,lobbyPx+(fX*(-mz)+sX*mx)*LSPD));
  lobbyPz=Math.max(-28,Math.min(28,lobbyPz+(fZ*(-mz)+sZ*mx)*LSPD));
  lbMesh.position.set(lobbyPx,0.45,lobbyPz);
  if(mx||mz) lbMesh.rotation.y=Math.atan2(fX*(-mz)+sX*mx,fZ*(-mz)+sZ*mx);

  // Camera
  const cd=8,ch=3.5;
  lbCam.position.set(
    lobbyPx-Math.sin(camYaw)*cd*Math.cos(camPitch),
    0.45+ch+Math.sin(camPitch)*cd,
    lobbyPz+Math.cos(camYaw)*cd*Math.cos(camPitch));
  lbCam.lookAt(lobbyPx,1.2,lobbyPz);

  // Portal glows + shimmer
  lbGlows.forEach(p=>{ p.t+=0.025; p.light.intensity=p.base+Math.sin(p.t)*1.1; });
  lbPortals.forEach((p,i)=>{ p.inner.material.opacity=0.1+Math.sin(t*1.5+i)*0.07; });

  // Portal labels + proximity
  let nearPortal=null;
  lbPortals.forEach(p=>{
    const d=Math.sqrt((lobbyPx-p.x)**2+(lobbyPz-p.z)**2);
    // Project to screen
    const v=new THREE.Vector3(p.x,3.2,p.z).project(lbCam);
    const sx=(v.x*.5+.5)*window.innerWidth;
    const sy=(-v.y*.5+.5)*window.innerHeight;
    if(v.z<1&&sx>10&&sx<window.innerWidth-10){
      p.div.style.display='block';
      p.div.style.left=sx+'px'; p.div.style.top=(sy-55)+'px';
    } else p.div.style.display='none';
    if(d<4) nearPortal=p;
  });
  if(nearPortal){
    if(lbLastProx!==nearPortal.game){ lbLastProx=nearPortal.game; toast('Presiona E para entrar'); }
    if(K['KeyE']||K['e']){ K['KeyE']=K['e']=false; showScreen(nearPortal.game); }
  } else lbLastProx=null;

  // Remote player meshes
  for(const id in PEERS){
    const p=PEERS[id];
    if(!lbRemotes[id]){
      const col=new THREE.Color(p.color||'#4a6572');
      const m=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8),
        new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.55}));
      m.add(new THREE.PointLight(col,1.5,4)); lbScene.add(m);
      lbRemotes[id]=m;
    }
    const bob=Math.sin(t+id.charCodeAt(0)*.3)*.08;
    lbRemotes[id].position.set(p.x||0,0.45+bob,p.z||0);
    lbRemotes[id].rotation.y=t*.4;
  }
  for(const id in lbRemotes) if(!PEERS[id]){ lbScene.remove(lbRemotes[id]); delete lbRemotes[id]; }

  if((mx||mz)&&Math.random()<.4) netSend({t:'ping',nick:ME.nick,color:ME.color,x:lobbyPx,z:lobbyPz,screen:'lobby'});
  lbR.render(lbScene,lbCam);
}

function lbRemoveRemote(id){ if(lbRemotes[id]){ lbScene&&lbScene.remove(lbRemotes[id]); delete lbRemotes[id]; } }

let gR=null,gScene=null,gCam=null,gAf=null;
let gCube=null,gY=0,gVY=0,gRun=false,gDist=0,gSpd=0,gScV=0;
let gObs=[];
const GGRAV=0.018,GJUMP=-0.28;
let gJumpKey=null;

function geoInit(){
  const cv=document.getElementById('cG');
  if(gR) return;
  gR=new THREE.WebGLRenderer({canvas:cv,antialias:true});

function geoResize(){

}
function geoStart(){
  document.getElementById('goGeo').classList.remove('on');
  if(!gScene){ geoInit(); geoResize(); }
  // Clear scene
  while(gScene.children.length) gScene.remove(gScene.children[0]);
  gObs=[]; gY=0; gVY=0; gSpd=0.12; gDist=0; gScV=0; gRun=true;
  document.getElementById('gsc').textContent='0';
  document.getElementById('gpc').textContent='0%';

  gScene.add(new THREE.AmbientLight(0x112211,2.5));
  const dl=new THREE.DirectionalLight(0xadff2f,1.2); dl.position.set(5,10,5); gScene.add(dl);

  // Floor
  const flr=new THREE.Mesh(new THREE.PlaneGeometry(300,8,150,1),
    new THREE.MeshBasicMaterial({color:0xadff2f,wireframe:true,transparent:true,opacity:0.08}));
  flr.rotation.x=-Math.PI/2; flr.position.set(150,0,0); gScene.add(flr);
  const sf=new THREE.Mesh(new THREE.PlaneGeometry(300,8),new THREE.MeshStandardMaterial({color:0x030a04}));
  sf.rotation.x=-Math.PI/2; sf.position.set(150,-0.01,0); gScene.add(sf);

  // Stars
  const sg=new THREE.BufferGeometry(),sp=[];
  for(let i=0;i<300;i++) sp.push(Math.random()*300,Math.random()*18+2,(Math.random()-.5)*8);
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  gScene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x4a6572,size:0.12})));

  // Player cube
  const col=new THREE.Color(ME.color);
  gCube=new THREE.Mesh(new THREE.BoxGeometry(0.82,0.82,0.82),
    new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.6}));
  gCube.position.set(0,0.41,0);
  gCube.add(new THREE.PointLight(col,2.5,5));
  gScene.add(gCube);

  // Generate obstacles
  const pal=[0x00f5ff,0xadff2f,0xff006e,0xff9500,0xbf5fff];
  let cx=14;
  for(let i=0;i<70;i++){
    const h=0.8+Math.random()*1.9, w=0.82;
    const c=new THREE.Color(pal[~~(Math.random()*pal.length)]);
    const ob=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.9),
      new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.25}));
    const wf=new THREE.Mesh(new THREE.BoxGeometry(w+.02,h+.02,.92),
      new THREE.MeshBasicMaterial({color:c,wireframe:true,transparent:true,opacity:0.35}));
    ob.add(wf); ob.position.set(cx,h/2,0); gScene.add(ob);
    gObs.push({mesh:ob,ox:cx,h,w});
    cx+=3.5+Math.random()*4;
    if(Math.random()<.4){
      const h2=.7+Math.random()*1.2;
      const ob2=new THREE.Mesh(new THREE.BoxGeometry(w,h2,.9),
        new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.25}));
      ob2.add(new THREE.Mesh(new THREE.BoxGeometry(w+.02,h2+.02,.92),
        new THREE.MeshBasicMaterial({color:c,wireframe:true,transparent:true,opacity:0.35})));
      ob2.position.set(cx,h2/2,0); gScene.add(ob2);
      gObs.push({mesh:ob2,ox:cx,h:h2,w});
      cx+=3+Math.random()*3;
    }
  }

  // Jump
  const jump=()=>{ if(gY<=0.02) gVY=GJUMP; };
  if(gJumpKey) window.removeEventListener('keydown',gJumpKey);
  gJumpKey=e=>{ if(e.code==='Space') jump(); };
  window.addEventListener('keydown',gJumpKey);
  document.getElementById('cG').onclick=jump;

  if(gAf) cancelAnimationFrame(gAf);
  gLoop();
}
function geoStop(){ gRun=false; if(gAf){cancelAnimationFrame(gAf);gAf=null;} if(gJumpKey){window.removeEventListener('keydown',gJumpKey);gJumpKey=null;} }
window.geoStart=geoStart;

function gLoop(){
  gAf=requestAnimationFrame(gLoop);
  if(curScreen!=='geo'||!gRun) return;
  gDist+=gSpd; gSpd=Math.min(0.23,0.12+gDist*.00012);
  gScV=~~(gDist*10);
  const pct=Math.min(100,~~(gDist/650*100));
  document.getElementById('gsc').textContent=gScV;
  document.getElementById('gpc').textContent=pct+'%';
  gVY+=GGRAV; gY-=gVY;
  if(gY<=0){gY=0;gVY=0;}
  gCube.position.set(0,gY+0.41,0);
  gCube.rotation.z-=gSpd*1.5;
  gObs.forEach(o=>{ o.ox-=gSpd; o.mesh.position.x=o.ox; });
  // Collision
  for(const o of gObs){
    if(o.ox+o.w/2>-.41&&o.ox-o.w/2<.41&&gY+.82>0&&gY<o.h){
      gRun=false;
      document.getElementById('goGeo').classList.add('on');
      document.getElementById('goGeoT').textContent='Puntuación: '+gScV+' ('+pct+'%)';
      return;
    }
  }
  if(pct>=100){ toast('¡NIVEL COMPLETADO!'); setTimeout(goLobby,2000); return; }
  gR.render(gScene,gCam);
}

let sR=null,sScene=null,sCam=null,sAf=null;
let sShip=null,sBullets=[],sEnemies=[],sEBullets=[];
let sSc=0,sWv=1,sLv=3,sRun=false,sPX=0;
let sFireKey=null;

function shInit(){
  const cv=document.getElementById('cS');
  if(sR) return;
  sR=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  sR.setPixelRatio(Math.min(devicePixelRatio,2));
  sR.setClearColor(0x02000a);
  sScene=new THREE.Scene();
  sScene.fog=new THREE.Fog(0x02000a,20,55);
  sCam=new THREE.PerspectiveCamera(55,1,0.1,80);
  sCam.position.set(0,14,18); sCam.lookAt(0,0,0);
}
function shResize(){
  if(!sR) return;
  const W=window.innerWidth,H=window.innerHeight-50;
  sR.setSize(W,H,false);
  sCam.aspect=W/H; sCam.updateProjectionMatrix();
}
function shStart(){
  document.getElementById('goSh').classList.remove('on');
  if(!sScene){ shInit(); shResize(); }
  while(sScene.children.length) sScene.remove(sScene.children[0]);
  sBullets=[]; sEnemies=[]; sEBullets=[]; sSc=0; sWv=1; sLv=3; sPX=0; sRun=true;
  document.getElementById('ssc').textContent='0';
  document.getElementById('swv').textContent='OLA 1';
  document.getElementById('slv').textContent='❤ ❤ ❤';

  sScene.add(new THREE.AmbientLight(0x110022,2.5));
  const dl=new THREE.DirectionalLight(0xff006e,1); dl.position.set(0,10,5); sScene.add(dl);

  // Stars
  const sg=new THREE.BufferGeometry(),sp=[];
  for(let i=0;i<600;i++) sp.push((Math.random()-.5)*80,Math.random()*30-5,(Math.random()-.5)*15-5);
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  sScene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x4a6572,size:0.1})));

  // Floor grid
  sScene.add(Object.assign(
    new THREE.Mesh(new THREE.PlaneGeometry(26,26,13,13),
      new THREE.MeshBasicMaterial({color:0xff006e,wireframe:true,transparent:true,opacity:0.06})),
    {rotation:{x:-Math.PI/2,y:0,z:0}}));

  // Player ship
  const col=new THREE.Color(ME.color);
  sShip=new THREE.Group();
  const body=new THREE.Mesh(new THREE.ConeGeometry(.5,1.4,6),
    new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.7}));
  body.rotation.x=-Math.PI/2;
  sShip.add(body);
  sShip.add(new THREE.Mesh(new THREE.BoxGeometry(2.8,.1,.7),
    new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.3})));
  sShip.add(new THREE.PointLight(col,2.5,5));
  sShip.position.set(0,.1,7); sScene.add(sShip);

  shSpawnWave();

  const fire=()=>shFire();
  if(sFireKey) window.removeEventListener('keydown',sFireKey);
  sFireKey=e=>{ if(e.code==='Space') fire(); };
  window.addEventListener('keydown',sFireKey);
  document.getElementById('cS').onclick=fire;

  if(sAf) cancelAnimationFrame(sAf);
  sLoop();
}
function shStop(){ sRun=false; if(sAf){cancelAnimationFrame(sAf);sAf=null;} if(sFireKey){window.removeEventListener('keydown',sFireKey);sFireKey=null;} }
window.shStart=shStart;

function shSpawnWave(){
  const rows=Math.min(3,1+~~(sWv/2)), cols=Math.min(9,4+sWv);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const col=new THREE.Color().setHSL(Math.random(),1,.55);
    const em=new THREE.Mesh(new THREE.OctahedronGeometry(.5,0),
      new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.5}));
    em.add(new THREE.Mesh(new THREE.OctahedronGeometry(.52,0),
      new THREE.MeshBasicMaterial({color:col,wireframe:true,transparent:true,opacity:.4})));
    em.add(new THREE.PointLight(col,1,3));
    em.position.set((c-(cols-1)/2)*2.3,.1,-8+r*2.5);
    sScene.add(em);
    sEnemies.push({mesh:em,alive:true,ex:(c-(cols-1)/2)*2.3,ez:-8+r*2.5,
      dir:1,spd:.012+sWv*.003,st:~~(80+Math.random()*160)});
  }
}
function shFire(){
  if(!sRun||!sShip) return;
  const col=new THREE.Color(ME.color);
  const b=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,.7,6),new THREE.MeshBasicMaterial({color:col}));
  b.position.copy(sShip.position); b.position.z-=1;
  b.add(new THREE.PointLight(col,2,3)); sScene.add(b);
  sBullets.push({mesh:b,spd:.28});
}
function shUpdateHud(){
  document.getElementById('ssc').textContent=sSc;
  document.getElementById('swv').textContent='OLA '+sWv;
  document.getElementById('slv').textContent='❤ '.repeat(Math.max(0,sLv)).trim()||'💀';
}
function sLoop(){
  sAf=requestAnimationFrame(sLoop);
  if(curScreen!=='shooter'||!sRun) return;
  const t=performance.now()*.001;
  if(K['KeyA']||K['a']||K['arrowleft'])  sPX=Math.max(-11,sPX-.13);
  if(K['KeyD']||K['d']||K['arrowright']) sPX=Math.min(11,sPX+.13);
  sShip.position.x+=(sPX-sShip.position.x)*.25;

  let edge=false;
  sEnemies.forEach(e=>{
    if(!e.alive) return;
    e.ex+=e.dir*e.spd; e.mesh.position.x=e.ex;
    e.mesh.rotation.y=t; e.mesh.rotation.z=t*.5;
    if(Math.abs(e.ex)>11) edge=true;
    if(--e.st<=0){
      e.st=~~(100+Math.random()*200);
      const b=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,.6,6),new THREE.MeshBasicMaterial({color:0xff006e}));
      b.position.copy(e.mesh.position); b.add(new THREE.PointLight(0xff006e,1.5,3)); sScene.add(b);
      sEBullets.push({mesh:b,spd:.1+sWv*.008});
    }
  });
  if(edge) sEnemies.forEach(e=>{ if(e.alive){e.dir*=-1; e.ez+=.6; e.mesh.position.z=e.ez;} });

  sBullets=sBullets.filter(b=>{
    b.mesh.position.z-=b.spd;
    if(b.mesh.position.z<-14){ sScene.remove(b.mesh); return false; }
    for(const e of sEnemies){
      if(!e.alive) continue;
      if(b.mesh.position.distanceTo(e.mesh.position)<.9){
        e.alive=false; sScene.remove(e.mesh); sScene.remove(b.mesh);
        sSc+=10*sWv; shUpdateHud();
        const fl=new THREE.PointLight(e.mesh.material.color,6,6);
        fl.position.copy(e.mesh.position); sScene.add(fl); setTimeout(()=>sScene.remove(fl),200);
        return false;
      }
    }
    return true;
  });
  sEBullets=sEBullets.filter(b=>{
    b.mesh.position.z+=b.spd;
    if(b.mesh.position.z>10){ sScene.remove(b.mesh); return false; }
    if(b.mesh.position.distanceTo(sShip.position)<.9){
      sLv--; shUpdateHud(); sScene.remove(b.mesh);
      if(sLv<=0){ sRun=false; document.getElementById('goSh').classList.add('on'); document.getElementById('goShT').textContent='Puntuación: '+sSc+' · Ola: '+sWv; }
      return false;
    }
    return true;
  });
  if(sEnemies.length&&sEnemies.every(e=>!e.alive)){
    sWv++; sEnemies=[]; shUpdateHud(); shSpawnWave(); toast('¡OLA '+sWv+'!');
  }
  sR.render(sScene,sCam);
}

  pLoop();
}
function pvpStop(){ pRun=false; if(pAf){cancelAnimationFrame(pAf);pAf=null;} if(pFireKey){window.removeEventListener('keydown',pFireKey);pFireKey=null;} }

function pvpFire(){
  if(!pRun||!pMe) return;
  const col=new THREE.Color(ME.color);
  const b=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,.6,6),new THREE.MeshBasicMaterial({color:col}));
  b.position.copy(pMe.position); b.rotation.x=Math.PI/2;
  b.add(new THREE.PointLight(col,2.5,4)); pScene.add(b);
  const dx=Math.sin(pFacing),dz=-Math.cos(pFacing);
  pBullets.push({mesh:b,dx,dz,spd:.28});
  netSend({t:'pvp_b',bx:pMe._x,bz:pMe._z,dx,dz,color:ME.color});
}

function pvpRemoteBullet(msg){
  if(!pRun||!pScene) return;
  const col=new THREE.Color(msg.color||'#ff006e');
  const b=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,.6,6),new THREE.MeshBasicMaterial({color:col}));
  b.position.set(msg.bx||0,.45,msg.bz||0); b.rotation.x=Math.PI/2;
  b.add(new THREE.PointLight(col,2,4)); pScene.add(b);
  pRBullets.push({mesh:b,dx:msg.dx||0,dz:msg.dz||0,spd:.28,owner:msg.id});
}
function pvpRemoveRemote(id){ if(pRemotes[id]){ pScene&&pScene.remove(pRemotes[id].mesh); delete pRemotes[id]; } }

function pLoop(){
  pAf=requestAnimationFrame(pLoop);
  if(curScreen!=='pvp'||!pRun) return;
  const t=performance.now()*.001;

  let mx=0,mz=0;
  if(K['KeyW']||K['w']) mz=-1; if(K['KeyS']||K['s']) mz=1;
  if(K['KeyA']||K['a']) mx=-1; if(K['KeyD']||K['d']) mx=1;
  if(mx&&mz){mx*=.707;mz*=.707;}
  pMe._x=Math.max(-ARENA+.5,Math.min(ARENA-.5,pMe._x+mx*.1));
  pMe._z=Math.max(-ARENA+.5,Math.min(ARENA-.5,pMe._z+mz*.1));
  pMe.position.set(pMe._x,.45,pMe._z);
  if(mx||mz){ pFacing=Math.atan2(mx,mz)+Math.PI; pMe.rotation.y=pFacing; }

  // Camera follow
  pCam.position.x+=(pMe._x-pCam.position.x)*.07;
  pCam.position.z+=(pMe._z+12-pCam.position.z)*.07;
  pCam.position.y=8; pCam.lookAt(pMe._x,0,pMe._z);

  // Remote players
  for(const id in PEERS){
    const rp=PEERS[id];
    if(!pRemotes[id]){
      const col=new THREE.Color(rp.color||'#ff006e');
      const m=new THREE.Mesh(new THREE.BoxGeometry(.9,.9,.9),
        new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.6}));
      m.add(new THREE.PointLight(col,2,5)); pScene.add(m);
      pRemotes[id]={mesh:m};
    }
    pRemotes[id].mesh.position.set(rp.x||0,.45,rp.z||0);
    pRemotes[id].mesh.rotation.y=t;
  }
  for(const id in pRemotes) if(!PEERS[id]){ pScene.remove(pRemotes[id].mesh); delete pRemotes[id]; }

  // My bullets
  pBullets=pBullets.filter(b=>{
    b.mesh.position.x+=b.dx*b.spd; b.mesh.position.z+=b.dz*b.spd;
    if(Math.abs(b.mesh.position.x)>ARENA||Math.abs(b.mesh.position.z)>ARENA){ pScene.remove(b.mesh); return false; }
    for(const id in pRemotes){
      if(b.mesh.position.distanceTo(pRemotes[id].mesh.position)<.9){
        pKills++; pScene.remove(b.mesh);
        document.getElementById('pkv').textContent='Kills: '+pKills;
        const fl=new THREE.PointLight(0xffd700,6,7); fl.position.copy(pRemotes[id].mesh.position);
        pScene.add(fl); setTimeout(()=>pScene.remove(fl),300);
        toast('¡ELIMINADO '+(PEERS[id]?.nick||id)+'!'); return false;
      }
    }
    return true;
  });

  // Remote bullets
  pRBullets=pRBullets.filter(b=>{
    b.mesh.position.x+=b.dx*b.spd; b.mesh.position.z+=b.dz*b.spd;
    if(Math.abs(b.mesh.position.x)>ARENA||Math.abs(b.mesh.position.z)>ARENA){ pScene.remove(b.mesh); return false; }
    if(b.mesh.position.distanceTo(pMe.position)<.9){ pScene.remove(b.mesh); toast('¡TE HAN GOLPEADO!'); return false; }
    return true;
  });

  const pp=Object.keys(pRemotes).length+1;
  document.getElementById('ppc2').textContent=pp+(pp===1?' jugador':' jugadores');
  if((mx||mz)&&Math.random()<.4) netSend({t:'ping',nick:ME.nick,color:ME.color,x:pMe._x,z:pMe._z,screen:'pvp'});
  pR.render(pScene,pCam);
}
</script>
</body>
